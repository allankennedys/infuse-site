    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "O que é inteligência artificial para WhatsApp?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "É um sistema que utiliza IA integrada ao WhatsApp para responder, qualificar e atender clientes automaticamente sem precisar de um atendente humano a cada mensagem. A IA interpreta o que o cliente escreve em linguagem natural e responde de forma personalizada, podendo registrar pedidos, tirar dúvidas, enviar catálogos e muito mais."
            }
          },
          {
            "@type": "Question",
            "name": "Como funciona a automação de WhatsApp para empresas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A automação de WhatsApp conecta seu número do WhatsApp Business a um sistema de fluxos inteligentes. Quando um cliente envia uma mensagem, o sistema identifica a intenção e executa a ação programada: resposta, envio de link, geração de orçamento ou agendamento, registrando tudo no CRM sem intervenção manual."
            }
          },
          {
            "@type": "Question",
            "name": "Qual a diferença entre chatbot e IA no WhatsApp?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Um chatbot tradicional segue um roteiro fixo de menus. Já a IA no WhatsApp entende linguagem natural: mesmo que o cliente escreva de forma diferente do esperado, o sistema compreende a intenção e responde de forma fluida. O resultado é uma experiência muito mais próxima de um atendimento humano real."
            }
          },
          {
            "@type": "Question",
            "name": "A IA no WhatsApp atende clientes fora do horário comercial?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sim! 24h por dia, 7 dias por semana, incluindo fins de semana e feriados. Enquanto você dorme, a IA responde dúvidas, capta leads, registra pedidos e agenda serviços. Quando sua equipe chegar pela manhã, tudo já está organizado no sistema."
            }
          },
          {
            "@type": "Question",
            "name": "Como funciona o sistema de agendamento para salão de beleza, barbearia e clínica de estética?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "O sistema de agendamento da Infuse permite que clientes de salões, barbearias e clínicas de estética marquem horários diretamente pelo WhatsApp ou por um link de agendamento online, sem precisar ligar ou falar no Whatsapp. O sistema exibe os horários disponíveis em tempo real, confirma automaticamente, envia lembretes antes da data e avisa sobre cancelamentos, reduzindo faltas e evitando conflitos na agenda. Tudo integrado ao WhatsApp que você já usa."
            }
          },
          {
            "@type": "Question",
            "name": "O sistema de agendamento reduz mesmo as faltas e cancelamentos de última hora?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sim. O principal motivo de faltas é o esquecimento. Com lembretes automáticos enviados via WhatsApp 24h e 1h antes do horário, a taxa de no-show cai drasticamente. Além disso, o sistema permite que o próprio cliente reagende com antecedência, liberando o horário para outro cliente no lugar de perder a vaga."
            }
          },
          {
            "@type": "Question",
            "name": "O que é uma landing page e por que meu negócio precisa de uma?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Uma landing page é uma página focada em converter o visitante em cliente, lead ou agendamento sem distrações. Diferente de um site completo, ela é projetada em torno de uma única oferta ou chamada para ação. Para anúncios no Instagram, Google ou WhatsApp, uma landing page bem feita aumenta significativamente a taxa de conversão e o retorno sobre o investimento em tráfego pago."
            }
          },
          {
            "@type": "Question",
            "name": "É possível integrar automação de WhatsApp com CRM?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sim. Na Infuse, integramos a automação de WhatsApp diretamente ao CRM, criando um funil de vendas unificado. Cada lead que entra pelo WhatsApp é automaticamente registrado, categorizado e acompanhado no painel. Isso dá visibilidade total sobre o pipeline de vendas, histórico de conversas e taxa de conversão sem trabalho manual duplicado."
            }
          }
        ]
      }
